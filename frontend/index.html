<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo"><i class="fas fa-book-open"></i> Campus Library</a>
        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count" class="cart-count">0</span></a>
        </nav>
    </header>
    
    <main>
        <h2><i class="fas fa-layer-group"></i> Featured Catalog</h2>
        
        <!-- Search bar added above catalog -->
        <div class="search-container" style="margin-bottom: 2rem;">
            <input type="text" id="search-bar" placeholder="Search by title, author, or category..." style="width: 100%; padding: 1rem; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem;">
        </div>

        <div id="catalog-container"></div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('/api/books')
                .then(res => res.json())
                .then(books => {
                    globalBooks = books; 
                    renderCatalog(books);
                    
                    // Search Filter Logic
                    document.getElementById('search-bar').addEventListener('input', (e) => {
                        const term = e.target.value.toLowerCase();
                        const filtered = globalBooks.filter(b => 
                            b.title.toLowerCase().includes(term) || 
                            b.author.toLowerCase().includes(term) ||
                            b.category.toLowerCase().includes(term)
                        );
                        renderCatalog(filtered);
                    });
                })
                .catch(err => console.error("API Error:", err));
        });

        // Extracted render logic to handle re-rendering on search
        function renderCatalog(books) {
            const container = document.getElementById('catalog-container');
            container.innerHTML = '';

            if(books.length === 0) {
                container.innerHTML = '<p>No books found matching your search.</p>';
                return;
            }
            
            const groupedBooks = books.reduce((acc, book) => {
                if (!acc[book.category]) acc[book.category] = [];
                acc[book.category].push(book);
                return acc;
            }, {});

            for (const [category, categoryBooks] of Object.entries(groupedBooks)) {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `
                    <h3 class="category-title">${category}</h3>
                    <div class="grid-container" id="grid-${category.replace(/\s+/g, '-')}"></div>
                `;
                container.appendChild(section);
                
                const grid = section.querySelector('.grid-container');
                
                categoryBooks.forEach(book => {
                    const card = document.createElement('div');
                    card.className = 'card clickable-card';
                    card.onclick = () => window.location.href = `book.html?id=${book.id}`;
                    
                    card.innerHTML = `
                        <img src="${book.localImage}" onerror="this.onerror=null;this.src='${book.remoteImage}';" alt="${book.title}">
                        <h3>${book.title}</h3>
                        <p>${book.author}</p>
                        <p style="font-size: 0.85rem; color: #666; margin-top: 0.5rem; flex-grow: 1;">${book.overview}</p>
                        <div class="button-group">
                            <button onclick="event.stopPropagation(); handleAddToCart('${book.id}')" class="btn"><i class="fas fa-plus"></i> Add to Cart</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }
    </script>
</body>
</html>
